services:
  pdamcore-marketing-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pdamcore.id}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.pdamcore.id}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-6289512728534}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-info@pdamcore.id}
        NEXT_PUBLIC_ANALYTICS_ENABLED: ${NEXT_PUBLIC_ANALYTICS_ENABLED:-true}
        NEXT_PUBLIC_ANALYTICS_ID: ${NEXT_PUBLIC_ANALYTICS_ID:-}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-pdamcore.id}
    image: pdamcore-marketing-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pdamcore.id}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.pdamcore.id}
      NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-6289512728534}
      NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-info@pdamcore.id}
      NEXT_PUBLIC_ANALYTICS_ENABLED: ${NEXT_PUBLIC_ANALYTICS_ENABLED:-true}
      NEXT_PUBLIC_ANALYTICS_ID: ${NEXT_PUBLIC_ANALYTICS_ID:-}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-pdamcore.id}
      LEAD_STORAGE_DIR: ${LEAD_STORAGE_DIR:-/app/data/leads}
      LEAD_PRIVACY_SALT: ${LEAD_PRIVACY_SALT:-}
      LEAD_FORM_MIN_AGE_MS: ${LEAD_FORM_MIN_AGE_MS:-1200}
      LEAD_FORM_MAX_AGE_MS: ${LEAD_FORM_MAX_AGE_MS:-86400000}
      DEMO_REQUEST_WEBHOOK_URL: ${DEMO_REQUEST_WEBHOOK_URL:-}
      DEMO_REQUEST_WEBHOOK_TOKEN: ${DEMO_REQUEST_WEBHOOK_TOKEN:-}
      CONTACT_REQUEST_WEBHOOK_URL: ${CONTACT_REQUEST_WEBHOOK_URL:-}
      CONTACT_REQUEST_WEBHOOK_TOKEN: ${CONTACT_REQUEST_WEBHOOK_TOKEN:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - pdamcore-marketing-leads:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pdamcore-marketing-leads:

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_SITE_URL: https://pdamcore.id
  NEXT_PUBLIC_APP_URL: https://app.pdamcore.id
  NEXT_PUBLIC_WHATSAPP_NUMBER: "6289512728534"
  NEXT_PUBLIC_CONTACT_EMAIL: info@pdamcore.id
  NEXT_PUBLIC_ANALYTICS_ENABLED: "true"
  NEXT_PUBLIC_ANALYTICS_ID: ""
  NEXT_PUBLIC_GA_MEASUREMENT_ID: ""
  NEXT_PUBLIC_PLAUSIBLE_DOMAIN: pdamcore.id
  LEAD_STORAGE_DIR: .data/leads
  LEAD_PRIVACY_SALT: ci-local-salt
  LEAD_FORM_MIN_AGE_MS: "1200"
  LEAD_FORM_MAX_AGE_MS: "86400000"

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit high severity vulnerabilities
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker-image:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-gates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
            --build-arg NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL" \
            --build-arg NEXT_PUBLIC_WHATSAPP_NUMBER="$NEXT_PUBLIC_WHATSAPP_NUMBER" \
            --build-arg NEXT_PUBLIC_CONTACT_EMAIL="$NEXT_PUBLIC_CONTACT_EMAIL" \
            --build-arg NEXT_PUBLIC_ANALYTICS_ENABLED="$NEXT_PUBLIC_ANALYTICS_ENABLED" \
            --build-arg NEXT_PUBLIC_ANALYTICS_ID="$NEXT_PUBLIC_ANALYTICS_ID" \
            --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID="$NEXT_PUBLIC_GA_MEASUREMENT_ID" \
            --build-arg NEXT_PUBLIC_PLAUSIBLE_DOMAIN="$NEXT_PUBLIC_PLAUSIBLE_DOMAIN" \
            -t pdamcore-marketing-web:ci .
